name: iOS Unsigned Build

on:
  push:
    branches: [ main, master ]
  pull_request: 
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          # Wir nutzen die stabile Version
          npm install ffmpeg-kit-react-native@6.0.2 --save --legacy-peer-deps

      - name: Surgical Podfile Patch
        run: |
          cd ios
          rm -f Podfile.lock
          
          # 1. Deployment Target im gesamten File auf 13.0 setzen
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/platform :ios, '12.4'/platform :ios, '13.0'/g" Podfile

          # 2. Bestehende post_install Blöcke finden und modifizieren
          # Wir fügen die Target-Einstellung direkt nach dem post_install-Aufruf ein
          sed -i '' "/post_install do |installer|/a\\
            installer.pods_project.targets.each do |target|\\
              target.build_configurations.each do |config|\\
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\\
              end\\
            end" Podfile

          # 3. Fallback auf 'min' Paket, falls das Standard-Paket (https) 404 wirft
          pod repo update
          pod install --repo-update || (sed -i '' "s/ffmpeg-kit-react-native\/https/ffmpeg-kit-react-native\/min/g" Podfile && pod install)

      - name: Build Xcode Archive (Unsigned)
        run: |
          # Achte darauf, dass 'cuteNTR' der Name deines Targets ist (laut Log ist es das)
          xcodebuild -workspace ios/cuteNTR.xcworkspace \
                     -scheme cuteNTR \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/cuteNTR.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean archive

      - name: Export .ipa (Manual Payload)
        run: |
          mkdir -p payload/Payload
          cp -r build/cuteNTR.xcarchive/Products/Applications/*.app payload/Payload/
          cd payload
          zip -r ../cuteNTR-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: cuteNTR-unsigned.ipa
