name: iOS Unsigned Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm install

      - name: Patch Podfile and Install Pods
        run: |
          cd ios
          # Wir erzwingen Version 5.1, da 6.0 einen 404-Fehler verursacht
          # Dies fügt die Zeile oben in das Podfile ein
          sed -i '' "1i\\
          pod 'ffmpeg-kit-ios-https', '5.1'
          " Podfile
          
          pod repo update
          pod cache clean ffmpeg-kit-ios-https --all
          # Falls 'pod install' fehlschlägt, versuchen wir es mit einem Workaround für die Codegen
          pod install --repo-update || pod install --repo-update

      - name: Build Xcode Archive (Unsigned)
        run: |
          xcodebuild -workspace ios/cuteNTR.xcworkspace \
                     -scheme cuteNTR \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/cuteNTR.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean archive

      - name: Export .ipa (Manual Payload)
        run: |
          mkdir -p payload/Payload
          cp -r build/cuteNTR.xcarchive/Products/Applications/*.app payload/Payload/
          cd payload
          zip -r ../cuteNTR-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: cuteNTR-unsigned.ipa
