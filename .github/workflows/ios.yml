name: iOS Unsigned Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          # Wir bleiben bei der aktuellen Version, fixen aber das Podfile
          npm install ffmpeg-kit-react-native@6.0.2 --save --legacy-peer-deps

      - name: Advanced Podfile Patch
        run: |
          cd ios
          rm -f Podfile.lock
          
          # 1. Deployment Target auf 13.0
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/platform :ios, '12.4'/platform :ios, '13.0'/g" Podfile

          # 2. Den FFmpeg-Download-Link im Podfile "umbiegen" oder erzwingen
          # Wir nutzen ein alternatives Subspec, falls das Standard-Subspec 404 wirft
          # Dieser Block wird ans Ende des Podfiles angehängt
          cat <<EOF >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          EOF

          pod repo update
          # Falls der Standard-Install fehlschlägt, nutzen wir 'min'-Version von ffmpeg (leichter & oft stabiler)
          pod install --repo-update || (sed -i '' "s/ffmpeg-kit-react-native\/https/ffmpeg-kit-react-native\/min/g" Podfile && pod install)

      - name: Build Xcode Archive (Unsigned)
        run: |
          xcodebuild -workspace ios/cuteNTR.xcworkspace \
                     -scheme cuteNTR \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/cuteNTR.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean archive

      - name: Export .ipa (Manual Payload)
        run: |
          mkdir -p payload/Payload
          cp -r build/cuteNTR.xcarchive/Products/Applications/*.app payload/Payload/
          cd payload
          zip -r ../cuteNTR-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: cuteNTR-unsigned.ipa
