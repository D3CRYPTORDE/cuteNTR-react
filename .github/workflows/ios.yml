name: iOS Unsigned Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies with Fixed FFmpeg
        run: |
          npm install
          # Wir zwingen das NPM Paket auf 5.1.0, damit das native Pod nicht 6.0 verlangt
          npm install ffmpeg-kit-react-native@5.1.0 --save

      - name: Force Clean and Patch Pods
        run: |
          cd ios
          # 1. Entferne die Lock-Datei komplett
          rm -rf Podfile.lock
          
          # 2. Setze iOS Deployment Target auf 13.0 (wichtig für FFmpeg 5.1)
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '13.0'/g" Podfile
          sed -i '' "s/platform :ios, '12.4'/platform :ios, '13.0'/g" Podfile

          # 3. Wir patchen das Podfile NICHT mehr manuell mit 'pod 5.1', 
          # da das NPM Paket 5.1.0 das jetzt automatisch richtig anfordert.
          
          # 4. Installation
          pod repo update
          pod install --repo-update

      - name: Build Xcode Archive (Unsigned)
        run: |
          xcodebuild -workspace ios/cuteNTR.xcworkspace \
                     -scheme cuteNTR \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/cuteNTR.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean archive

      - name: Export .ipa (Manual Payload)
        run: |
          mkdir -p payload/Payload
          cp -r build/cuteNTR.xcarchive/Products/Applications/*.app payload/Payload/
          cd payload
          zip -r ../cuteNTR-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: cuteNTR-unsigned.ipa
