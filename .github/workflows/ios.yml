name: iOS Unsigned Build

on:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          # Sicherstellen, dass das npm-Modul zur Pod-Version passt
          npm install ffmpeg-kit-react-native@6.0.2 --save --legacy-peer-deps

      - name: Install Pods
        run: |
          cd ios
          rm -rf Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build Xcode Archive (Unsigned)
        run: |
          xcodebuild -workspace ios/cuteNTR.xcworkspace \
                     -scheme cuteNTR \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/cuteNTR.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean archive

      - name: Export .ipa
        run: |
          mkdir -p payload/Payload
          cp -r build/cuteNTR.xcarchive/Products/Applications/*.app payload/Payload/
          cd payload && zip -r ../cuteNTR-unsigned.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: cuteNTR-unsigned.ipa
