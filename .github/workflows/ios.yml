name: iOS Unsigned Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm install

      - name: Fix FFmpeg-Kit and Install Pods
        run: |
          cd ios
          # Verhindert 404 Fehler durch Aktualisierung der Spec-Repos
          pod repo update
          # Löscht eventuell korrupte FFmpeg Downloads
          pod cache clean ffmpeg-kit-ios-https --all
          # Installiert Pods mit automatischer Fehlerbehebung für Codegen
          pod install --repo-update

      - name: Build Xcode Archive (Unsigned)
        run: |
          # Wir nutzen 'cuteNTR' oder 'adorableNTR' - je nach deinem Project Name in Xcode
          # Falls der Name im Log 'cuteNTR' war, nutzen wir diesen hier:
          xcodebuild -workspace ios/cuteNTR.xcworkspace \
                     -scheme cuteNTR \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/cuteNTR.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean archive

      - name: Export .ipa (Manual Payload)
        run: |
          mkdir -p payload/Payload
          # Kopiert die .app Datei aus dem Archiv in den Payload Ordner
          cp -r build/cuteNTR.xcarchive/Products/Applications/*.app payload/Payload/
          cd payload
          # Erstellt das IPA-Paket
          zip -r ../cuteNTR-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: cuteNTR-unsigned.ipa
